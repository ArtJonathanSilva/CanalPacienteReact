<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Paciente - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
    <main class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon" aria-hidden="true">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 20v18h8V20H8zm0-4h8V8H8v8zm12 4v18h8V20h-8zm0-4h8V8h-8v8zm12 4v18h8V20h-8zm0-4h8V8h-8v8z" fill="currentColor"/>
                        <rect x="20" y="28" width="8" height="10" rx="1" fill="currentColor" opacity="0.7"/>
                        <rect x="32" y="24" width="6" height="14" rx="1" fill="currentColor"/>
                        <path d="M38 22v-2c0-2.2-1.8-4-4-4s-4 1.8-4 4v2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    </svg>
                </div>
                <h1 class="login-title">Portal do Paciente</h1>
                <p class="login-subtitle">Unimed</p>
            </div>

            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <label for="carteirinha">Carteirinha</label>
                    <input
                        type="text"
                        id="carteirinha"
                        name="carteirinha"
                        placeholder="Digite sua carteirinha"
                        autocomplete="off"
                    >
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        placeholder="Digite sua senha"
                        autocomplete="off"
                    >
                </div>
                <button type="submit" class="btn-entrar">Entrar</button>
            </form>

            <div class="login-hint">
                Carteirinha: 0089234000012 | Senha: 123456
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
